<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Discord認証中</title>
</head>
<body>
  <p>Discord認証中...</p>

  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");

    if (!code) {
      document.body.innerText = "Discord code取得失敗";
      throw new Error();
    }

    fetch("https://api.tack2427.f5.si/discord-auth", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    })
    .then(res => res.json())
    .then(data => {
      localStorage.setItem("discord_id", data.discord_id);

      const lineUrl = "https://access.line.me/oauth2/v2.1/authorize" +
        "?response_type=code" +
        "&client_id=2009714517" +
        "&redirect_uri=https://login.tack2427.f5.si/line-callback.html" +
        "&state=abc123" +
        "&scope=profile%20openid";

      location.href = lineUrl;
    })
    .catch(() => {
      document.body.innerText = "エラー";
    });
  </script>
</body>
</html>
