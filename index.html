<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント連携システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 背景画像の設定（ここを書き換えて好きな画像にできます） */
        body {
            background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* すりガラス風のエフェクト */
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- メインコンテナ -->
    <div id="app" class="w-full max-w-md glass-container rounded-2xl shadow-2xl p-8 border border-white/20 relative overflow-hidden">
        
        <!-- ユーザー用ビュー -->
        <div id="user-view">
            <h1 class="text-2xl font-bold text-center mb-6 text-slate-700">アカウント連携</h1>
            
            <div id="status-message" class="hidden mb-6 p-4 rounded-lg text-sm text-center"></div>
            <div id="discord-profile-info" class="hidden mb-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700">
                <p class="font-semibold text-slate-800 mb-2">Discordプロフィール</p>
                <div id="discord-username" class="text-slate-600"></div>
                <div id="discord-bio" class="mt-2 text-slate-600"></div>
                <div id="discord-status" class="mt-2 text-slate-600"></div>
            </div>
            <div id="line-profile-info" class="hidden mb-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700">
                <p class="font-semibold text-slate-800 mb-2">LINE認証データ</p>
                <div id="line-profile-summary" class="text-slate-600"></div>
            </div>

            <!-- ステップ1: Discord -->
            <div id="step-discord" class="space-y-4">
                <p class="text-sm text-slate-600 text-center">まず、Discordアカウントでログインしてください。</p>
                <button onclick="loginDiscord()" class="w-full flex items-center justify-center gap-3 bg-[#5865F2] hover:bg-[#4752C4] text-white py-3 px-4 rounded-xl font-medium transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg">
                    <i data-lucide="message-square"></i>
                    Discordでログイン
                </button>
            </div>

            <!-- ステップ2: LINE -->
            <div id="step-line" class="hidden space-y-4">
                <div class="flex items-center justify-center gap-2 text-green-600 bg-green-50/80 p-3 rounded-lg text-sm mb-4">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    Discordの認証が完了しました
                </div>
                <p class="text-sm text-slate-600 text-center">次に、LINEアカウントでログインして紐付けを完了させます。</p>
                <button onclick="loginLine()" class="w-full flex items-center justify-center gap-3 bg-[#06C755] hover:bg-[#05b34c] text-white py-3 px-4 rounded-xl font-medium transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg">
                    <i data-lucide="message-circle"></i>
                    LINEでログイン
                </button>
            </div>

            <!-- ローディング -->
            <div id="step-loading" class="hidden flex flex-col items-center justify-center py-8">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-800 mb-4"></div>
                <p class="text-slate-600 text-sm" id="loading-text">処理中...</p>
            </div>
        </div>

        <!-- 管理者ログインビュー -->
        <div id="admin-login" class="hidden space-y-4 text-center">
            <h1 class="text-xl font-bold text-slate-700 flex items-center justify-center gap-2">
                <i data-lucide="lock" class="w-5 h-5"></i>
                管理者ログイン
            </h1>
            <p class="text-xs text-slate-500">パスワードを入力してEnterを押してください</p>
            <div class="space-y-3">
                <input type="password" id="admin-pass" 
                    class="w-full border border-slate-200 rounded-lg p-3 text-center focus:outline-none focus:ring-2 focus:ring-slate-400 transition-all bg-white/50" 
                    placeholder="Password"
                    onkeydown="if(event.key==='Enter') checkAdminPassword()">
                <div id="admin-error" class="hidden text-xs text-red-500 font-medium bg-red-50 p-2 rounded"></div>
                <button id="admin-login-btn" onclick="checkAdminPassword()" class="w-full bg-slate-800 text-white py-3 rounded-lg text-sm hover:bg-slate-700 transition-all font-medium shadow-md">
                    認証する
                </button>
            </div>
            <button onclick="exitAdmin()" class="text-xs text-slate-400 hover:text-slate-600">ユーザー画面へ戻る</button>
        </div>

        <!-- 管理者リストビュー -->
        <div id="admin-view" class="hidden">
            <h1 class="text-xl font-bold mb-4 text-slate-700 flex items-center gap-2 border-b pb-2">
                <i data-lucide="users"></i> 連携ユーザー一覧
            </h1>
            <div id="admin-list" class="space-y-3 max-h-96 overflow-y-auto mb-4 pr-1 custom-scrollbar">
                <!-- データがここに挿入されます -->
            </div>
            <button onclick="exitAdmin()" class="w-full bg-slate-100 text-slate-600 py-2 rounded-lg text-sm hover:bg-slate-200 transition-colors">ログアウトして戻る</button>
        </div>
    </div>

    <script>
        // --- 設定値 ---
        const DISCORD_CLIENT_ID = "1271101266680086591";
        const LINE_CLIENT_ID = "2009714517";
        const DISCORD_SCOPE = "identify";
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const API_BASE_URL = "https://api.tack2427.f5.si";

        lucide.createIcons();
        const views = {
            discord: document.getElementById('step-discord'),
            line: document.getElementById('step-line'),
            loading: document.getElementById('step-loading'),
            user: document.getElementById('user-view'),
            adminLogin: document.getElementById('admin-login'),
            admin: document.getElementById('admin-view')
        };
        const statusMsg = document.getElementById('status-message');
        const discordProfileInfo = document.getElementById('discord-profile-info');
        const discordUsernameEl = document.getElementById('discord-username');
        const discordBioEl = document.getElementById('discord-bio');
        const discordStatusEl = document.getElementById('discord-status');
        const lineProfileInfo = document.getElementById('line-profile-info');
        const lineProfileSummary = document.getElementById('line-profile-summary');
        let discordProfileData = null;
        let lineProfileData = null;

        function hideAllSteps() {
            views.discord.classList.add('hidden');
            views.line.classList.add('hidden');
            views.loading.classList.add('hidden');
        }

        function showView(viewName) {
            hideAllSteps();
            if (views[viewName]) views[viewName].classList.remove('hidden');
        }

        function showMessage(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = `mb-6 p-4 rounded-lg text-sm text-center ${isError ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
            statusMsg.classList.remove('hidden');
        }

        function updateProfileDisplays() {
            if (discordProfileData) {
                discordUsernameEl.textContent = `Discordユーザー: ${discordProfileData.username}`;
                discordBioEl.textContent = `自己紹介: ${discordProfileData.bio || 'なし'}`;
                discordStatusEl.textContent = `カスタムステータス: ${discordProfileData.customStatus || 'なし'}`;
                discordProfileInfo.classList.remove('hidden');
            }

            if (lineProfileData) {
                lineProfileSummary.textContent = `LINEプロフィール情報: ${lineProfileData.displayName || '取得済み'}${lineProfileData.userId ? ' / ID: ' + lineProfileData.userId : ''}`;
                lineProfileInfo.classList.remove('hidden');
            }
        }

        function saveDiscordProfile(profile) {
            if (!profile) return;
            discordProfileData = profile;
            localStorage.setItem('discordProfile', JSON.stringify(profile));
            updateProfileDisplays();
        }

        function saveLineProfile(profile) {
            if (!profile) return;
            lineProfileData = profile;
            localStorage.setItem('lineProfile', JSON.stringify(profile));
            updateProfileDisplays();
        }

        async function fetchDiscordProfile(discordToken) {
            if (!discordToken) return null;
            const headers = { 'Authorization': `Bearer ${discordToken}` };

            try {
                const response = await fetch('https://discord.com/api/users/@me', { headers });
                if (!response.ok) throw new Error('Discordユーザー情報の取得に失敗しました');
                const baseData = await response.json();

                let profileData = {};
                const profileResponse = await fetch('https://discord.com/api/users/@me/profile', { headers });
                if (profileResponse.ok) {
                    profileData = await profileResponse.json();
                }

                return {
                    id: baseData.id,
                    username: `${baseData.username}#${baseData.discriminator}`,
                    globalName: baseData.global_name || '',
                    bio: profileData.bio || '',
                    customStatus: profileData.custom_status || '',
                    fetchedAt: new Date().toISOString()
                };
            } catch (error) {
                console.warn(error);
                return null;
            }
        }

        // --- 認証フロー ---
        function loginDiscord() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${DISCORD_SCOPE}`;
            window.location.href = url;
        }

        function loginLine() {
            const state = Math.random().toString(36).substring(7);
            localStorage.setItem('line_state', state);
            const url = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${LINE_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}&scope=profile`;
            window.location.href = url;
        }

        window.onload = async () => {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(window.location.search);
            const savedDiscordToken = localStorage.getItem('discordToken');
            const savedDiscordProfileRaw = localStorage.getItem('discordProfile');
            const savedLineProfileRaw = localStorage.getItem('lineProfile');
            discordProfileData = savedDiscordProfileRaw ? JSON.parse(savedDiscordProfileRaw) : null;
            lineProfileData = savedLineProfileRaw ? JSON.parse(savedLineProfileRaw) : null;
            const urlParamsHash = new URLSearchParams(hash);

            updateProfileDisplays();

            if (hash === 'admin') {
                views.user.classList.add('hidden');
                views.adminLogin.classList.remove('hidden');
                document.getElementById('admin-pass').focus();
                return;
            }

            if (urlParamsHash.has('access_token')) {
                const discordToken = urlParamsHash.get('access_token');
                localStorage.setItem('discordToken', discordToken);
                window.history.replaceState(null, null, window.location.pathname);

                const profile = await fetchDiscordProfile(discordToken);
                saveDiscordProfile(profile);
                showView('line');
                return;
            }

            if (params.has('code')) {
                const lineCode = params.get('code');
                const discordToken = localStorage.getItem('discordToken');
                window.history.replaceState(null, null, window.location.pathname);

                if (!discordToken) {
                    showMessage('Discordの認証情報が見つかりません。最初からやり直してください。', true);
                    showView('discord');
                    return;
                }

                showView('loading');
                await sendToApi(discordToken, lineCode);
                return;
            }

            if (savedDiscordToken) {
                showView('line');
            } else {
                showView('discord');
            }
        };

        async function sendToApi(discordToken, lineCode) {
            try {
                const response = await fetch(`${API_BASE_URL}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discordToken, lineCode, redirectUri: REDIRECT_URI })
                });

                if (!response.ok) throw new Error('APIサーバーでエラーが発生しました');

                const result = await response.json();
                if (result.lineProfile) {
                    saveLineProfile(result.lineProfile);
                }

                localStorage.removeItem('discordToken');
                hideAllSteps();
                showView('discord');
                showMessage("🎉 アカウントの連携が完了しました！");
            } catch (error) {
                showView('line');
                showMessage("連携に失敗しました: " + error.message, true);
            }
        }

        // --- 管理者機能 ---
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toLowerCase();
        }

        async function checkAdminPassword() {
            const input = document.getElementById('admin-pass');
            const errorEl = document.getElementById('admin-error');
            const btn = document.getElementById('admin-login-btn');
            
            if (!input.value) return;

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = "認証中...";

            try {
                const hashedPassword = await hashPassword(input.value);

                const response = await fetch(`${API_BASE_URL}/admin_login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: hashedPassword })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    views.adminLogin.classList.add('hidden');
                    views.admin.classList.remove('hidden');
                    if (result.token) sessionStorage.setItem('adminToken', result.token);
                    fetchAdminData();
                } else {
                    errorEl.textContent = result.message || "パスワードが一致しません。";
                    errorEl.classList.remove('hidden');
                    input.value = "";
                }
            } catch (error) {
                errorEl.textContent = "サーバーに接続できませんでした。";
                errorEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = "認証する";
            }
        }

        function exitAdmin() {
            window.location.hash = "";
            sessionStorage.removeItem('adminToken');
            location.reload();
        }

        async function fetchAdminData() {
            const listEl = document.getElementById('admin-list');
            listEl.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">読み込み中...</p>';
            
            const adminToken = sessionStorage.getItem('adminToken');
            
            try {
                const response = await fetch(`${API_BASE_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                if (!response.ok) throw new Error('データの取得に失敗しました。');
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    listEl.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">連携データはありません。</p>';
                    return;
                }

                listEl.innerHTML = data.map(item => `
                    <div class="bg-white/80 border border-slate-100 rounded-xl p-3 flex items-center gap-3 shadow-sm hover:shadow-md transition-shadow">
                        <img src="${item.lineProfile.pictureUrl || 'https://via.placeholder.com/40'}" class="w-12 h-12 rounded-full border-2 border-white shadow-inner" onerror="this.src='https://via.placeholder.com/40'">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-slate-800 truncate">${item.lineProfile.displayName}</p>
                            <p class="text-xs text-slate-500 truncate flex items-center gap-1">
                                <i data-lucide="message-square" class="w-3 h-3"></i> ${item.discordUsername || 'ID: ' + item.discordId}
                            </p>
                            <p class="text-[10px] text-slate-400 mt-1">${new Date(item.linkedAt).toLocaleString('ja-JP')}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons(); // 新しく追加されたアイコンを描画
            } catch (error) {
                listEl.innerHTML = `<p class="text-sm text-red-500 text-center py-4">${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
